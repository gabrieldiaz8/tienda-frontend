<div class="login-page">
  <form class="login-form" (ngSubmit)="submit()" #f="ngForm">
    <h2 class="login-title">Ingresar</h2>

    @if (error) {
      <div class="login-error">{{ error }}</div>
    }

    <input class="login-input" type="text" [(ngModel)]="usuario" name="usuario"
      placeholder="Usuario" required autocomplete="username" autofocus>

    <input class="login-input" type="password" [(ngModel)]="password" name="password"
      placeholder="Contraseña" required autocomplete="current-password">

    <button class="login-btn" type="submit" [disabled]="loading">
      {{ loading ? 'Ingresando…' : 'Ingresar' }}
    </button>

    <a class="login-back" routerLink="/home">Volver al inicio</a>
  </form>
</div>
